name: Release

on:
  push:
    branches: [ main, master ]
    # Only semver tags trigger a tagged release: v1.2.3, v1.2.3-rc1, etc.
    # Plain `v1` or `v1.2` won't match, preventing accidental non-semver releases.
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/upwatchly/metrics-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get commit hash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set Version
        id: set_version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            # Hard validation: tag must be strict major.minor.patch (with optional pre-release).
            if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Tag v$VERSION is not valid semver (expected vMAJOR.MINOR.PATCH)"
              exit 1
            fi
          else
            VERSION=$(git describe --tags --always --dirty | sed 's/^v//')
            if [[ $GITHUB_REF == refs/heads/* ]]; then
              VERSION="$VERSION-$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT_HASH}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/upwatchly-agent-linux-amd64 ./cmd/agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/upwatchly-agent-linux-arm64 ./cmd/agent

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT_HASH }}

      - name: Delete existing latest release
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          gh release create latest \
            --title "Latest (${VERSION})" \
            --notes "Automated build from main branch (${COMMIT_HASH})" \
            --prerelease \
            dist/upwatchly-agent-linux-amd64 \
            dist/upwatchly-agent-linux-arm64 \
            install.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/upwatchly-agent-linux-amd64
            dist/upwatchly-agent-linux-arm64
            install.sh
